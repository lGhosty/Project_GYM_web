<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — FreakyZone</title>
<link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo">
      <span class="logo-title">FREAKYZONE</span>
      <span class="logo-sub">Equipe Freaky</span>
    </div>
    <h2>Entrar na conta</h2>
    <p>Acesse sua plataforma de treinos e dieta</p>
    <div id="msg-erro" class="msg-erro" style="display:none;"></div>
    <form id="form-login">
      <div class="field"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com" required/></div>
      <div class="field"><label>Senha</label><input type="password" id="senha" placeholder="••••••••" required/></div>
      <button type="submit" class="btn-primary" id="btn">ENTRAR</button>
    </form>
    <p class="auth-switch">Não tem conta? <a href="pages/cadastro.html">Cadastre-se</a></p>
  </div>
</div>
<script>
const API = 'http://localhost:3333/api'
document.getElementById('form-login').addEventListener('submit', async function(e) {
  e.preventDefault()
  const btn = document.getElementById('btn')
  btn.textContent = 'ENTRANDO...'; btn.disabled = true
  try {
    const r = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value
      })
    })
    const d = await r.json()
    if (!r.ok) { mostrarErro(d.erro || 'Erro ao fazer login.'); return }
    localStorage.setItem('token', d.token)
    localStorage.setItem('usuario', JSON.stringify(d.usuario))
    window.location.href = d.usuario.role === 'admin' ? 'pages/admin.html' : 'pages/home.html'
  } catch { mostrarErro('Servidor indisponível. Verifique se o back-end está rodando.') }
  finally { btn.textContent = 'ENTRAR'; btn.disabled = false }
})
function mostrarErro(m) { const el = document.getElementById('msg-erro'); el.textContent = m; el.style.display = 'block' }
</script>
</body>
</html>
