<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Equipe Freaky</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="logo">
        <span class="logo-title">FreakyZone</span>
        <span class="logo-sub">Equipe Freaky</span>
      </div>
      <h2>Entrar na conta</h2>
      <p>Acesse sua plataforma de treinos e dieta</p>
      <div id="msg-erro" style="display:none;color:#ff4444;font-size:.85rem;margin-bottom:10px;text-align:center;"></div>
      <form id="form-login">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">ENTRAR</button>
      </form>
      <p class="auth-switch">Não tem conta? <a href="pages/cadastro.html">Cadastre-se</a></p>
    </div>
  </div>
  <script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault()
      const erro = document.getElementById('msg-erro')
      try {
        const res = await fetch('http://localhost:3333/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
          })
        })
        const dados = await res.json()
        if (!res.ok) throw new Error(dados.erro || 'Erro ao fazer login')
        localStorage.setItem('token', dados.token)
        localStorage.setItem('usuario', JSON.stringify(dados.usuario))
        window.location.href = 'pages/home.html'
      } catch (err) {
        erro.textContent = err.message
        erro.style.display = 'block'
      }
    })
  </script>
</body>
</html>
