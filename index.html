<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Equipe Shadow</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="logo">
        <span class="logo-title">IRONZONE</span>
        <span class="logo-sub">Equipe Shadow</span>
      </div>
      <h2>Entrar na conta</h2>
      <p>Acesse sua plataforma de treinos e dieta</p>

      <form action="pages/home.html">
        <div class="field">
          <label>E-mail</label>
          <input type="email" placeholder="seu@email.com" required/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">ENTRAR</button>
      </form>
      <p class="auth-switch">Não tem conta? <a href="pages/cadastro.html">Cadastre-se</a></p>
    </div>
  </div>
</body>
</html>
