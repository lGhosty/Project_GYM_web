<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dieta — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
  .meal-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;padding:16px;display:flex;align-items:center;gap:14px;}
  .meal-icon{width:50px;height:50px;border-radius:10px;background:var(--brd);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
  .meal-info{flex:1;}
  .meal-name{font-weight:700;font-size:.95rem;}
  .meal-detail{font-size:.75rem;color:var(--mut);margin-top:3px;}
  .meal-kcal{font-size:1.3rem;font-weight:900;color:var(--red);text-align:right;}
  .meal-kcal span{display:block;font-family:inherit;font-size:.6rem;color:var(--mut);font-weight:400;}
</style>
</head>
<body>
<nav class="navbar">
  <a href="home.html" class="brand">FREAKYZONE</a>
  <div class="nav-links">
    <a href="home.html">Início</a>
    <a href="treino.html">Treino</a>
    <a href="dieta.html" class="active">Dieta</a>
    <a href="agenda.html">Agenda</a>
    <a href="perfil.html">Perfil</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <div class="eyebrow">Plano Alimentar</div>
    <h2>SUA <span style="color:var(--red)">DIETA</span></h2>
    <p id="total-header">Carregando...</p>
  </div>
  <div id="lista-refeicoes"><p style="color:var(--mut)">Carregando refeições...</p></div>
</div>
<footer>Equipe <span>Freaky</span> · FreakyZone</footer>
<script>
const API   = 'http://localhost:3333/api'
const token = localStorage.getItem('token')
if (!token) window.location.href = '../index.html'
function hdrs() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }
const emojis = ['🌅','🥜','🍗','🥤','🍽️','🌙','🥗','🍎']

async function carregarDieta() {
  const el = document.getElementById('lista-refeicoes')
  try {
    const r = await fetch(`${API}/dietas`, { headers: hdrs() })
    const { refeicoes, total_calorias } = await r.json()
    document.getElementById('total-header').textContent = `Total: ${total_calorias} kcal · Plano do professor`
    if (!refeicoes.length) { el.innerHTML = '<div class="card"><p>Nenhuma refeição cadastrada pelo professor ainda.</p></div>'; return }
    el.innerHTML = refeicoes.map((r, i) => `
      <div class="meal-card">
        <div class="meal-icon">${emojis[i % emojis.length]}</div>
        <div class="meal-info">
          <div class="meal-name">${r.nome}${r.horario ? ' · ' + r.horario : ''}</div>
          <div class="meal-detail">${r.descricao || ''}</div>
        </div>
        <div class="meal-kcal">${r.calorias || 0}<span>kcal</span></div>
      </div>`).join('')
  } catch { el.innerHTML = '<p style="color:var(--mut)">Erro ao carregar dieta.</p>' }
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '../index.html' }
carregarDieta()
</script>
</body>
</html>
