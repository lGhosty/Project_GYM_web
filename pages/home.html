<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Início — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="home.html" class="brand">FREAKYZONE</a>
  <div class="nav-links">
    <a href="home.html" class="active">Início</a>
    <a href="treino.html">Treino</a>
    <a href="dieta.html">Dieta</a>
    <a href="agenda.html">Agenda</a>
    <a href="perfil.html">Perfil</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>
<div class="content">
  <div class="home-hero">
    <div class="eyebrow">Bem-vindo de volta</div>
    <h2>OLÁ, <span id="nome-usuario">ATLETA!</span></h2>
    <p id="hero-sub">FreakyZone 2026</p>
  </div>
  <div class="stat-strip">
    <div class="stat-box"><div class="val" id="qtd-treinos">-</div><div class="lbl">Treinos</div></div>
    <div class="stat-box"><div class="val" id="total-kcal">-</div><div class="lbl">Kcal no plano</div></div>
    <div class="stat-box"><div class="val" id="qtd-notif">0</div><div class="lbl">Notificações</div></div>
  </div>
  <div class="sec-head"><h3>Próximo <span>Treino</span></h3></div>
  <div id="card-treino" class="card"><p style="color:var(--mut)">Carregando...</p></div>
  <div class="sec-head"><h3>Próximo <span>Evento</span></h3></div>
  <div id="card-agenda" class="card"><p style="color:var(--mut)">Carregando...</p></div>
  <div class="sec-head"><h3>Última <span>Notificação</span></h3></div>
  <div id="card-notif" class="card"><p style="color:var(--mut)">Carregando...</p></div>
</div>
<footer>Equipe <span>Freaky</span> · FreakyZone · Programação para Web 2026</footer>
<script>
const API     = 'http://localhost:3333/api'
const token   = localStorage.getItem('token')
const usuario = JSON.parse(localStorage.getItem('usuario') || '{}')
if (!token) window.location.href = '../index.html'

document.getElementById('nome-usuario').textContent = (usuario.nome || 'Atleta').split(' ')[0].toUpperCase() + '!'
document.getElementById('hero-sub').textContent = `Objetivo: ${usuario.objetivo || '—'} · FreakyZone 2026`

function hdrs() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }

async function carregarTreinos() {
  try {
    const r = await fetch(`${API}/treinos`, { headers: hdrs() })
    const treinos = await r.json()
    document.getElementById('qtd-treinos').textContent = treinos.length
    const card = document.getElementById('card-treino')
    if (!treinos.length) { card.innerHTML = '<p>Nenhum treino cadastrado pelo professor ainda.</p>'; return }
    const t = treinos[0]
    card.innerHTML = `
      <h3>💪 ${t.nome}</h3>
      <p>${t.dia_semana} · ${t.duracao_min || '?'} min · ${t.exercicios?.length || 0} exercícios</p>
      <a href="treino.html" style="display:inline-block;margin-top:12px;background:var(--red);color:#fff;padding:10px 22px;border-radius:6px;font-weight:700;font-size:.85rem;text-decoration:none;">VER TREINO →</a>`
  } catch { document.getElementById('card-treino').innerHTML = '<p style="color:var(--mut)">Erro ao carregar.</p>' }
}

async function carregarAgenda() {
  try {
    const r = await fetch(`${API}/agendamentos`, { headers: hdrs() })
    const lista = await r.json()
    const card = document.getElementById('card-agenda')
    const prox = lista.filter(a => new Date(a.data_hora) >= new Date())[0]
    if (!prox) { card.innerHTML = '<p>Nenhum evento agendado.</p>'; return }
    const dt = new Date(prox.data_hora)
    card.innerHTML = `
      <h3>📅 ${prox.titulo}</h3>
      <p>${dt.toLocaleDateString('pt-BR')} às ${dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })} · ${prox.tipo}</p>
      <a href="agenda.html" style="display:inline-block;margin-top:10px;font-size:.82rem;font-weight:600;">Ver agenda completa →</a>`
  } catch { document.getElementById('card-agenda').innerHTML = '<p style="color:var(--mut)">Erro ao carregar.</p>' }
}

async function carregarNotificacoes() {
  try {
    const r = await fetch(`${API}/notificacoes`, { headers: hdrs() })
    const lista = await r.json()
    document.getElementById('qtd-notif').textContent = lista.filter(n => !n.lida).length
    const card = document.getElementById('card-notif')
    if (!lista.length) { card.innerHTML = '<p>Nenhuma notificação.</p>'; return }
    const n = lista[0]
    card.innerHTML = `
      <h3>🔔 ${n.titulo}</h3>
      <p>${n.mensagem}</p>
      <p style="margin-top:6px;font-size:.75rem;color:var(--mut);">${new Date(n.criado_em).toLocaleDateString('pt-BR')} · ${n.lida ? 'Lida' : 'Não lida'}</p>`
  } catch {}
}

async function carregarDieta() {
  try {
    const r = await fetch(`${API}/dietas`, { headers: hdrs() })
    const { total_calorias } = await r.json()
    document.getElementById('total-kcal').textContent = total_calorias >= 1000
      ? (total_calorias / 1000).toFixed(1) + 'k'
      : total_calorias
  } catch {}
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '../index.html' }

carregarTreinos(); carregarAgenda(); carregarNotificacoes(); carregarDieta()
</script>
</body>
</html>
