<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Início — Equipe Shadow</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="brand">IRONZONE</a>
    <div class="nav-links">
      <a href="home.html" class="active">Início</a>
      <a href="treino.html">Treino</a>
      <a href="dieta.html">Dieta</a>
      <a href="perfil.html">Perfil</a>
      <a href="#" id="btn-sair" class="sair">Sair</a>
    </div>
  </nav>

  <div class="content">
    <div class="home-hero">
      <div class="eyebrow">Bem-vindo de volta</div>
      <h2>OLÁ, <span id="nome-usuario">ATLETA!</span></h2>
      <p>IronZone · Equipe Shadow</p>
    </div>

    <div class="stat-strip">
      <div class="stat-box"><div class="val" id="qtd-treinos">—</div><div class="lbl">Treinos cadastrados</div></div>
      <div class="stat-box"><div class="val" id="total-kcal">—</div><div class="lbl">Kcal no plano</div></div>
      <div class="stat-box"><div class="val" id="qtd-refeicoes">—</div><div class="lbl">Refeições</div></div>
    </div>

    <div class="sec-head">
      <h3>Seus <span>Treinos</span></h3>
      <a href="treino.html" style="font-size:.8rem;font-weight:600;">Ver todos →</a>
    </div>
    <div id="lista-treinos-home" class="card">
      <p style="color:var(--mut)">Carregando...</p>
    </div>

    <div class="sec-head">
      <h3>Plano <span>Alimentar</span></h3>
      <a href="dieta.html" style="font-size:.8rem;font-weight:600;">Ver dieta →</a>
    </div>
    <div id="lista-dieta-home" class="card">
      <p style="color:var(--mut)">Carregando...</p>
    </div>
  </div>

  <footer>Equipe <span>Shadow</span> · IronZone · Programação para Web 2026</footer>

  <script>
    const token = localStorage.getItem('token')
    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}')
    if (!token) window.location.href = '../index.html'

    const API = 'http://localhost:3333/api'
    const headers = { 'Authorization': `Bearer ${token}` }

    document.getElementById('nome-usuario').textContent = (usuario.nome || 'ATLETA').toUpperCase()

    document.getElementById('btn-sair').addEventListener('click', (e) => {
      e.preventDefault()
      localStorage.removeItem('token')
      localStorage.removeItem('usuario')
      window.location.href = '../index.html'
    })

    fetch(`${API}/treinos`, { headers })
      .then(r => r.json())
      .then(treinos => {
        document.getElementById('qtd-treinos').textContent = treinos.length
        const el = document.getElementById('lista-treinos-home')
        if (!treinos.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhum treino cadastrado.</p>'; return }
        el.innerHTML = '<ul>' + treinos.slice(0,3).map(t =>
          `<li><span>${t.dia_semana}</span> <span class="badge badge-red">${t.nome}</span></li>`
        ).join('') + '</ul>'
      })
      .catch(() => {
        document.getElementById('lista-treinos-home').innerHTML = '<p style="color:var(--mut)">Erro ao carregar treinos.</p>'
      })

    fetch(`${API}/dietas`, { headers })
      .then(r => r.json())
      .then(data => {
        const refeicoes = data.refeicoes || []
        document.getElementById('qtd-refeicoes').textContent = refeicoes.length
        document.getElementById('total-kcal').textContent = (data.total_calorias || 0) + ' kcal'
        const el = document.getElementById('lista-dieta-home')
        if (!refeicoes.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhuma refeição cadastrada.</p>'; return }
        el.innerHTML = '<ul>' + refeicoes.slice(0,3).map(r =>
          `<li><span>${r.horario || ''}</span> <span>${r.nome}</span> <span style="color:var(--mut);font-size:.8rem;">${r.calorias} kcal</span></li>`
        ).join('') + '</ul>'
      })
      .catch(() => {
        document.getElementById('lista-dieta-home').innerHTML = '<p style="color:var(--mut)">Erro ao carregar dieta.</p>'
      })
  </script>
</body>
</html>
