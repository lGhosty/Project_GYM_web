<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Treino — Equipe Freaky</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="brand">FreakyZone</a>
    <div class="nav-links">
      <a href="home.html">Início</a>
      <a href="treino.html" class="active">Treino</a>
      <a href="dieta.html">Dieta</a>
      <a href="perfil.html">Perfil</a>
      <a href="#" id="btn-sair" class="sair">Sair</a>
    </div>
  </nav>

  <div class="content">
    <div class="page-header">
      <div class="eyebrow">Seus treinos cadastrados</div>
      <h2>TREINOS</h2>
      <p>Consulte e cadastre seus treinos</p>
    </div>

    <div id="lista-treinos">
      <p style="color:var(--mut)">Carregando...</p>
    </div>

    <div class="sec-head" style="margin-top:32px;"><h3>Cadastrar <span>Novo Treino</span></h3></div>
    <div class="card">
      <div id="msg-treino" style="display:none;font-size:.85rem;margin-bottom:12px;"></div>
      <form id="form-treino">
        <div class="field">
          <label>Nome do Treino</label>
          <input type="text" id="nome-treino" placeholder="Ex: Peito e Tríceps" required/>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Dia da Semana</label>
            <input type="text" id="dia-semana" placeholder="Ex: Segunda" required/>
          </div>
          <div class="field">
            <label>Duração (min)</label>
            <input type="number" id="duracao" placeholder="Ex: 60" required/>
          </div>
        </div>
        <button type="submit" class="btn-primary">CADASTRAR TREINO</button>
      </form>
    </div>
  </div>

  <footer>Equipe <span>Freaky</span> · FreakyZone · Programação para Web 2026</footer>

  <script>
    const token = localStorage.getItem('token')
    if (!token) window.location.href = '../index.html'

    const API = 'http://localhost:3333/api'
    const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }

    document.getElementById('btn-sair').addEventListener('click', (e) => {
      e.preventDefault()
      localStorage.removeItem('token')
      localStorage.removeItem('usuario')
      window.location.href = '../index.html'
    })

    function carregarTreinos() {
      fetch(`${API}/treinos`, { headers })
        .then(r => r.json())
        .then(treinos => {
          const el = document.getElementById('lista-treinos')
          if (!treinos.length) {
            el.innerHTML = '<div class="card"><p style="color:var(--mut)">Nenhum treino cadastrado ainda.</p></div>'
            return
          }
          el.innerHTML = treinos.map(t => `
            <div class="card" style="padding:8px 16px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <h3 style="margin:0;">💪 ${t.nome}</h3>
                <span class="badge badge-red">${t.dia_semana}</span>
              </div>
              <p style="color:var(--mut);font-size:.83rem;">${t.duracao_min} minutos</p>
              ${t.exercicios && t.exercicios.length ? `
                <div style="margin-top:8px;">
                  ${t.exercicios.map((ex, i) => `
                    <div class="ex-row">
                      <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
                      <div class="ex-info">
                        <div class="ex-name">${ex.nome}</div>
                        <div class="ex-detail">${ex.series} séries × ${ex.repeticoes} reps</div>
                      </div>
                    </div>
                  `).join('')}
                </div>` : ''}
            </div>
          `).join('')
        })
        .catch(() => {
          document.getElementById('lista-treinos').innerHTML = '<div class="card"><p style="color:var(--mut)">Erro ao carregar treinos.</p></div>'
        })
    }

    carregarTreinos()

    document.getElementById('form-treino').addEventListener('submit', async (e) => {
      e.preventDefault()
      const msg = document.getElementById('msg-treino')
      try {
        const res = await fetch(`${API}/treinos`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            nome: document.getElementById('nome-treino').value,
            dia_semana: document.getElementById('dia-semana').value,
            duracao_min: parseInt(document.getElementById('duracao').value),
            exercicios: []
          })
        })
        const dados = await res.json()
        if (!res.ok) throw new Error(dados.erro || 'Erro ao cadastrar')
        msg.textContent = '✅ Treino cadastrado com sucesso!'
        msg.style.color = '#00cc66'
        msg.style.display = 'block'
        e.target.reset()
        carregarTreinos()
      } catch (err) {
        msg.textContent = err.message
        msg.style.color = '#ff4444'
        msg.style.display = 'block'
      }
    })
  </script>
</body>
</html>
