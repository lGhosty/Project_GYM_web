<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Treino — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
  .ex-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--brd);}
  .ex-row:last-child{border-bottom:none;}
  .ex-num{font-size:1.2rem;font-weight:900;color:var(--red);min-width:28px;}
  .ex-info{flex:1;}
  .ex-name{font-weight:700;font-size:.95rem;}
  .ex-detail{font-size:.75rem;color:var(--mut);margin-top:2px;}
  .ex-tag{background:var(--brd);color:var(--mut);border-radius:5px;padding:3px 8px;font-size:.62rem;font-weight:700;text-transform:uppercase;white-space:nowrap;}
</style>
</head>
<body>
<nav class="navbar">
  <a href="home.html" class="brand">FREAKYZONE</a>
  <div class="nav-links">
    <a href="home.html">Início</a>
    <a href="treino.html" class="active">Treino</a>
    <a href="dieta.html">Dieta</a>
    <a href="agenda.html">Agenda</a>
    <a href="perfil.html">Perfil</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <div class="eyebrow">Seus Treinos</div>
    <h2>PLANO DE <span style="color:var(--red)">TREINO</span></h2>
    <p>Treinos criados pelo seu professor</p>
  </div>
  <div id="lista-treinos"><p style="color:var(--mut)">Carregando treinos...</p></div>
</div>
<footer>Equipe <span>Freaky</span> · FreakyZone</footer>
<script>
const API   = 'http://localhost:3333/api'
const token = localStorage.getItem('token')
if (!token) window.location.href = '../index.html'
function hdrs() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }

async function carregarTreinos() {
  const el = document.getElementById('lista-treinos')
  try {
    const r = await fetch(`${API}/treinos`, { headers: hdrs() })
    const treinos = await r.json()
    if (!treinos.length) { el.innerHTML = '<div class="card"><p>Nenhum treino cadastrado pelo professor ainda.</p></div>'; return }
    el.innerHTML = treinos.map(t => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:22px 0 10px;">
        <h3 style="font-size:1.3rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;">${t.nome}</h3>
        <span class="badge badge-red">${t.dia_semana} · ${t.duracao_min || '?'}min</span>
      </div>
      <div class="card" style="padding:8px 16px;">
        ${t.exercicios && t.exercicios.length
          ? t.exercicios.map((ex, i) => `
              <div class="ex-row">
                <div class="ex-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="ex-info">
                  <div class="ex-name">${ex.nome}</div>
                  <div class="ex-detail">${ex.series} séries × ${ex.repeticoes} reps · ${ex.descanso_s || '?'}s descanso</div>
                </div>
                <div class="ex-tag">${ex.grupo || 'Geral'}</div>
              </div>`).join('')
          : '<p style="color:var(--mut);padding:10px 0;">Nenhum exercício cadastrado.</p>'
        }
      </div>`).join('')
  } catch { el.innerHTML = '<p style="color:var(--mut)">Erro ao carregar treinos.</p>' }
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '../index.html' }
carregarTreinos()
</script>
</body>
</html>
