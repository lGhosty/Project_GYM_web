<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agenda — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
  .agenda-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;padding:16px;display:flex;gap:14px;align-items:flex-start;}
  .agenda-date{background:var(--red);color:#fff;border-radius:8px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:52px;}
  .agenda-day{font-size:1.4rem;font-weight:900;line-height:1;}
  .agenda-month{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;}
  .agenda-info{flex:1;}
  .agenda-nome{font-weight:700;font-size:.95rem;}
  .agenda-meta{font-size:.75rem;color:var(--mut);margin-top:3px;}
  .b-pend{background:rgba(245,224,1,.12);color:#F5E001;border:1px solid #F5E001;padding:3px 10px;border-radius:5px;font-size:.62rem;font-weight:700;text-transform:uppercase;}
  .b-conf{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid #2ecc71;padding:3px 10px;border-radius:5px;font-size:.62rem;font-weight:700;text-transform:uppercase;}
  .b-canc{background:rgba(224,16,16,.12);color:var(--red);border:1px solid var(--red);padding:3px 10px;border-radius:5px;font-size:.62rem;font-weight:700;text-transform:uppercase;}
</style>
</head>
<body>
<nav class="navbar">
  <a href="home.html" class="brand">FREAKYZONE</a>
  <div class="nav-links">
    <a href="home.html">Início</a>
    <a href="treino.html">Treino</a>
    <a href="dieta.html">Dieta</a>
    <a href="agenda.html" class="active">Agenda</a>
    <a href="perfil.html">Perfil</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <div class="eyebrow">Seus Compromissos</div>
    <h2>MINHA <span style="color:var(--red)">AGENDA</span></h2>
    <p id="agenda-sub">Carregando...</p>
  </div>
  <div id="lista-agenda"><p style="color:var(--mut)">Carregando agendamentos...</p></div>
</div>
<footer>Equipe <span>Freaky</span> · FreakyZone</footer>
<script>
const API   = 'http://localhost:3333/api'
const token = localStorage.getItem('token')
if (!token) window.location.href = '../index.html'
function hdrs() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }

async function carregarAgenda() {
  const el = document.getElementById('lista-agenda')
  try {
    const r = await fetch(`${API}/agendamentos`, { headers: hdrs() })
    const lista = await r.json()
    document.getElementById('agenda-sub').textContent = `${lista.length} evento(s) agendado(s)`
    if (!lista.length) { el.innerHTML = '<div class="card"><p>Nenhum evento agendado.</p></div>'; return }
    const badgeCls = { pendente:'b-pend', confirmado:'b-conf', cancelado:'b-canc' }
    const badgeTxt = { pendente:'PENDENTE', confirmado:'CONFIRMADO', cancelado:'CANCELADO' }
    el.innerHTML = lista.map(a => {
      const dt = new Date(a.data_hora)
      return `
        <div class="agenda-card">
          <div class="agenda-date">
            <div class="agenda-day">${dt.getDate()}</div>
            <div class="agenda-month">${dt.toLocaleString('pt-BR',{month:'short'}).replace('.','')}</div>
          </div>
          <div class="agenda-info">
            <div class="agenda-nome">${a.titulo}</div>
            <div class="agenda-meta">🕐 ${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · ${a.tipo}${a.descricao?' · '+a.descricao:''}</div>
          </div>
          <span class="${badgeCls[a.status]}">${badgeTxt[a.status]}</span>
        </div>`}).join('')
  } catch { el.innerHTML = '<p style="color:var(--mut)">Erro ao carregar agenda.</p>' }
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '../index.html' }
carregarAgenda()
</script>
</body>
</html>
