<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastro — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo">
      <span class="logo-title">FREAKYZONE</span>
      <span class="logo-sub">Crie sua conta</span>
    </div>
    <h2>Cadastro</h2>
    <p>Preencha seus dados para começar</p>
    <div id="msg-erro"    class="msg-erro"    style="display:none;"></div>
    <div id="msg-sucesso" class="msg-sucesso" style="display:none;"></div>
    <form id="form-cad">
      <div class="field-row">
        <div class="field"><label>Nome *</label><input id="nome" placeholder="João" required/></div>
        <div class="field"><label>Sobrenome</label><input id="sob" placeholder="Silva"/></div>
      </div>
      <div class="field"><label>E-mail *</label><input type="email" id="email" placeholder="seu@email.com" required/></div>
      <div class="field-row">
        <div class="field"><label>Senha *</label><input type="password" id="senha" placeholder="••••••••" required/></div>
        <div class="field"><label>Confirmar *</label><input type="password" id="conf" placeholder="••••••••" required/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Peso (kg)</label><input type="number" id="peso" placeholder="80"/></div>
        <div class="field"><label>Altura (cm)</label><input type="number" id="altura" placeholder="175"/></div>
      </div>
      <div class="field">
        <label>Objetivo</label>
        <select id="obj">
          <option>Ganho de Massa</option>
          <option>Perda de Peso</option>
          <option>Definição Muscular</option>
          <option>Condicionamento</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" id="btn">CRIAR CONTA</button>
    </form>
    <p class="auth-switch">Já tem conta? <a href="../index.html">Fazer login</a></p>
  </div>
</div>
<script>
const API = 'http://localhost:3333/api'
document.getElementById('form-cad').addEventListener('submit', async function(e) {
  e.preventDefault()
  const btn = document.getElementById('btn')
  btn.textContent = 'CRIANDO...'; btn.disabled = true
  const senha = document.getElementById('senha').value
  const conf  = document.getElementById('conf').value
  if (senha !== conf) { mostrarErro('As senhas não conferem.'); btn.textContent = 'CRIAR CONTA'; btn.disabled = false; return }
  const dados = {
    nome:     `${document.getElementById('nome').value} ${document.getElementById('sob').value}`.trim(),
    email:    document.getElementById('email').value,
    senha,
    peso:     Number(document.getElementById('peso').value) || null,
    altura:   Number(document.getElementById('altura').value) || null,
    objetivo: document.getElementById('obj').value,
  }
  try {
    const r = await fetch(`${API}/auth/cadastro`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados)
    })
    const d = await r.json()
    if (!r.ok) { mostrarErro(d.erro || 'Erro ao cadastrar.'); return }
    localStorage.setItem('token', d.token)
    localStorage.setItem('usuario', JSON.stringify(d.usuario))
    mostrarSucesso('Conta criada! Redirecionando...')
    setTimeout(() => { window.location.href = 'home.html' }, 1500)
  } catch { mostrarErro('Servidor indisponível.') }
  finally { btn.textContent = 'CRIAR CONTA'; btn.disabled = false }
})
function mostrarErro(m)    { const el = document.getElementById('msg-erro');    el.textContent = m; el.style.display = 'block' }
function mostrarSucesso(m) { const el = document.getElementById('msg-sucesso'); el.textContent = m; el.style.display = 'block' }
</script>
</body>
</html>
