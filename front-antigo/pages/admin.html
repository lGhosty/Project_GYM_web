<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel Admin — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
  :root { --red:#E01010; --blk:#0a0a0a; --drk:#141414; --card:#1a1a1a; --brd:#2e2e2e; --txt:#f0f0f0; --mut:#666; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--blk);color:var(--txt);font-family:'Barlow','Arial',sans-serif;min-height:100vh;}
  .navbar{display:flex;justify-content:space-between;align-items:center;background:#0e0e0e;padding:14px 28px;border-bottom:2px solid var(--red);}
  .navbar .brand{font-size:1.4rem;font-weight:900;color:var(--red);letter-spacing:2px;}
  .navbar .admin-badge{background:var(--red);color:#fff;padding:4px 12px;border-radius:4px;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .navbar a{color:var(--mut);text-decoration:none;font-size:.85rem;font-weight:600;padding:8px 12px;border-radius:6px;transition:.2s;}
  .navbar a:hover{color:var(--txt);background:rgba(255,255,255,.05);}
  .navbar .sair{color:var(--red);border:1px solid var(--red);}
  .navbar .sair:hover{background:var(--red);color:#fff;}
  .nav-links{display:flex;gap:6px;align-items:center;}
  .content{max-width:900px;margin:0 auto;padding:32px 20px 60px;}
  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{padding:10px 20px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--mut);font-weight:600;font-size:.85rem;cursor:pointer;transition:.2s;}
  .tab.active{background:var(--red);color:#fff;border-color:var(--red);}
  .section{display:none;}
  .section.active{display:block;}
  .sec-title{font-size:1.4rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-left:4px solid var(--red);padding-left:12px;}
  .card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:20px;margin-bottom:12px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:.75rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;background:#111;border:1.5px solid var(--brd);border-radius:8px;padding:11px 14px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;transition:.2s;-webkit-appearance:none;}
  .field textarea{min-height:80px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(224,16,16,.08);}
  .field select option{background:#111;}
  .btn-primary{background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-weight:700;font-size:.9rem;letter-spacing:1px;cursor:pointer;transition:.2s;}
  .btn-primary:hover{background:#b30d0d;transform:translateY(-1px);}
  .btn-sm{padding:6px 14px;font-size:.78rem;border-radius:6px;border:none;cursor:pointer;font-weight:600;transition:.2s;}
  .btn-danger{background:rgba(224,16,16,.15);color:var(--red);border:1px solid var(--red);}
  .btn-danger:hover{background:var(--red);color:#fff;}
  .btn-success{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid #2ecc71;}
  .aluno-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd);}
  .aluno-row:last-child{border-bottom:none;}
  .aluno-av{width:40px;height:40px;border-radius:50%;background:var(--brd);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .aluno-info{flex:1;}
  .aluno-nome{font-weight:700;font-size:.95rem;}
  .aluno-email{font-size:.75rem;color:var(--mut);}
  .msg-ok{background:rgba(46,204,113,.1);border:1px solid #2ecc71;color:#2ecc71;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:12px;display:none;}
  .msg-err{background:rgba(224,16,16,.1);border:1px solid var(--red);color:var(--red);border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:12px;display:none;}
  .stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .stat-box{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:16px;text-align:center;}
  .stat-val{font-size:1.8rem;font-weight:900;color:var(--red);line-height:1;}
  .stat-lbl{font-size:.65rem;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
  #select-aluno-treino,#select-aluno-dieta,#select-aluno-aval,#select-aluno-agenda,#select-aluno-notif{
    width:100%;background:#111;border:1.5px solid var(--brd);border-radius:8px;padding:11px 14px;
    color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;margin-bottom:14px;-webkit-appearance:none;
  }
  #select-aluno-treino:focus,#select-aluno-dieta:focus,#select-aluno-aval:focus,#select-aluno-agenda:focus,#select-aluno-notif:focus{
    outline:none;border-color:var(--red);
  }
</style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="brand">FREAKYZONE</span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="nav-links">
    <a href="home.html">Ver como Aluno</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>

<div class="content">

  <!-- Stats rápidos -->
  <div class="stat-strip">
    <div class="stat-box"><div class="stat-val" id="total-alunos">-</div><div class="stat-lbl">Alunos</div></div>
    <div class="stat-box"><div class="stat-val" id="total-treinos">-</div><div class="stat-lbl">Treinos</div></div>
    <div class="stat-box"><div class="stat-val" id="total-avals">-</div><div class="stat-lbl">Avaliações</div></div>
  </div>

  <!-- Abas -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('alunos')">👥 Alunos</button>
    <button class="tab" onclick="showTab('treinos')">🏋️ Criar Treino</button>
    <button class="tab" onclick="showTab('dieta')">🥗 Criar Dieta</button>
    <button class="tab" onclick="showTab('avaliacao')">📊 Avaliação</button>
    <button class="tab" onclick="showTab('agenda')">📅 Agenda</button>
    <button class="tab" onclick="showTab('notif')">🔔 Notificações</button>
  </div>

  <!-- ── ABA: ALUNOS ── -->
  <div id="tab-alunos" class="section active">
    <div class="sec-title">Alunos Cadastrados</div>
    <div class="card">
      <div id="lista-alunos"><p style="color:var(--mut)">Carregando...</p></div>
    </div>
  </div>

  <!-- ── ABA: CRIAR TREINO ── -->
  <div id="tab-treinos" class="section">
    <div class="sec-title">Criar Treino para Aluno</div>
    <div class="card">
      <div id="ok-treino" class="msg-ok"></div>
      <div id="err-treino" class="msg-err"></div>
      <div class="field"><label>Aluno</label>
        <select id="select-aluno-treino"><option value="">Selecione um aluno...</option></select>
      </div>
      <div class="form-row">
        <div class="field"><label>Nome do Treino</label><input id="t-nome" placeholder="Ex: Peito e Tríceps"/></div>
        <div class="field"><label>Dia da Semana</label>
          <select id="t-dia">
            <option>Segunda</option><option>Terça</option><option>Quarta</option>
            <option>Quinta</option><option>Sexta</option><option>Sábado</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Duração (min)</label><input id="t-dur" type="number" placeholder="55"/></div>
      <div class="field"><label>Exercícios (JSON)</label>
        <textarea id="t-exercicios" placeholder='[{"nome":"Supino","series":4,"repeticoes":10,"descanso_s":90,"grupo":"Peito"}]'></textarea>
      </div>
      <button class="btn-primary" onclick="criarTreino()">CRIAR TREINO</button>
    </div>
  </div>

  <!-- ── ABA: CRIAR DIETA ── -->
  <div id="tab-dieta" class="section">
    <div class="sec-title">Adicionar Refeição para Aluno</div>
    <div class="card">
      <div id="ok-dieta" class="msg-ok"></div>
      <div id="err-dieta" class="msg-err"></div>
      <div class="field"><label>Aluno</label>
        <select id="select-aluno-dieta"><option value="">Selecione um aluno...</option></select>
      </div>
      <div class="form-row">
        <div class="field"><label>Nome da Refeição</label><input id="d-nome" placeholder="Ex: Café da Manhã"/></div>
        <div class="field"><label>Horário</label><input id="d-hora" placeholder="07:00"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Calorias (kcal)</label><input id="d-kcal" type="number" placeholder="620"/></div>
        <div class="field"><label>Descrição</label><input id="d-desc" placeholder="Ovos + aveia + banana"/></div>
      </div>
      <button class="btn-primary" onclick="criarDieta()">ADICIONAR REFEIÇÃO</button>
    </div>
  </div>

  <!-- ── ABA: AVALIAÇÃO ── -->
  <div id="tab-avaliacao" class="section">
    <div class="sec-title">Registrar Avaliação Física</div>
    <div class="card">
      <div id="ok-aval" class="msg-ok"></div>
      <div id="err-aval" class="msg-err"></div>
      <div class="field"><label>Aluno</label>
        <select id="select-aluno-aval"><option value="">Selecione um aluno...</option></select>
      </div>
      <div class="form-row">
        <div class="field"><label>Peso (kg)</label><input id="av-peso" type="number" placeholder="82.5"/></div>
        <div class="field"><label>% Gordura</label><input id="av-gord" type="number" placeholder="14.0"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Massa Muscular (kg)</label><input id="av-massa" type="number" placeholder="45.0"/></div>
        <div class="field"><label>Data</label><input id="av-data" type="date"/></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="av-obs" placeholder="Aluno evoluiu bem..."></textarea></div>
      <button class="btn-primary" onclick="criarAvaliacao()">REGISTRAR AVALIAÇÃO</button>
    </div>

    <div class="sec-title" style="margin-top:28px;">Histórico de Avaliações</div>
    <div id="lista-avals"><p style="color:var(--mut)">Carregando...</p></div>
  </div>

  <!-- ── ABA: AGENDA ── -->
  <div id="tab-agenda" class="section">
    <div class="sec-title">Agendar Evento</div>
    <div class="card">
      <div id="ok-agenda" class="msg-ok"></div>
      <div id="err-agenda" class="msg-err"></div>
      <div class="field"><label>Aluno</label>
        <select id="select-aluno-agenda"><option value="">Selecione um aluno...</option></select>
      </div>
      <div class="form-row">
        <div class="field"><label>Título</label><input id="ag-titulo" placeholder="Ex: Avaliação Física"/></div>
        <div class="field"><label>Tipo</label>
          <select id="ag-tipo">
            <option value="treino">Treino</option>
            <option value="avaliacao">Avaliação</option>
            <option value="consulta">Consulta</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Data e Hora</label><input id="ag-data" type="datetime-local"/></div>
        <div class="field"><label>Descrição</label><input id="ag-desc" placeholder="Detalhes do evento"/></div>
      </div>
      <button class="btn-primary" onclick="criarAgendamento()">AGENDAR</button>
    </div>

    <div class="sec-title" style="margin-top:28px;">Todos os Agendamentos</div>
    <div id="lista-agendamentos"><p style="color:var(--mut)">Carregando...</p></div>
  </div>

  <!-- ── ABA: NOTIFICAÇÕES ── -->
  <div id="tab-notif" class="section">
    <div class="sec-title">Enviar Notificação</div>
    <div class="card">
      <div id="ok-notif" class="msg-ok"></div>
      <div id="err-notif" class="msg-err"></div>
      <div class="field"><label>Aluno</label>
        <select id="select-aluno-notif"><option value="">Selecione um aluno...</option></select>
      </div>
      <div class="field"><label>Título</label><input id="n-titulo" placeholder="Ex: Seu treino foi atualizado!"/></div>
      <div class="field"><label>Mensagem</label><textarea id="n-msg" placeholder="Mensagem para o aluno..."></textarea></div>
      <button class="btn-primary" onclick="enviarNotificacao()">ENVIAR</button>
    </div>
  </div>

</div><!-- /content -->

<script>
const API = 'http://localhost:3333/api'
const token = localStorage.getItem('token')
const usuario = JSON.parse(localStorage.getItem('usuario') || '{}')

// Proteção: só admin pode acessar esta página
if (!token || usuario.role !== 'admin') {
  alert('Acesso negado! Apenas administradores.')
  window.location.href = '../index.html'
}

function hdrs() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
}

// ── TABS ──────────────────────────────────────────────────────
function showTab(nome) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('tab-' + nome).classList.add('active')
  event.target.classList.add('active')
}

// ── CARREGAR ALUNOS ──────────────────────────────────────────
let alunos = []

async function carregarAlunos() {
  try {
    const r = await fetch(`${API}/usuarios/alunos`, { headers: hdrs() })
    alunos = await r.json()

    // Preenche a lista visual
    const lista = document.getElementById('lista-alunos')
    if (!alunos.length) { lista.innerHTML = '<p style="color:var(--mut)">Nenhum aluno cadastrado.</p>'; return }

    lista.innerHTML = alunos.map(a => `
      <div class="aluno-row">
        <div class="aluno-av">🧑</div>
        <div class="aluno-info">
          <div class="aluno-nome">${a.nome}</div>
          <div class="aluno-email">${a.email} · ${a.objetivo || 'Sem objetivo'}</div>
        </div>
        <div style="font-size:.75rem;color:var(--mut);">ID: ${a.id}</div>
      </div>
    `).join('')

    // Atualiza stats
    document.getElementById('total-alunos').textContent = alunos.length

    // Preenche todos os selects de alunos
    const opts = '<option value="">Selecione...</option>' +
      alunos.map(a => `<option value="${a.id}">${a.nome}</option>`).join('')

    ;['select-aluno-treino','select-aluno-dieta','select-aluno-aval',
      'select-aluno-agenda','select-aluno-notif'].forEach(id => {
      document.getElementById(id).innerHTML = opts
    })

  } catch (e) {
    document.getElementById('lista-alunos').innerHTML = '<p style="color:var(--mut)">Erro ao carregar alunos.</p>'
  }
}

// ── CRIAR TREINO ──────────────────────────────────────────────
async function criarTreino() {
  const usuario_id = document.getElementById('select-aluno-treino').value
  const nome       = document.getElementById('t-nome').value.trim()
  const dia_semana = document.getElementById('t-dia').value
  const duracao_min = Number(document.getElementById('t-dur').value)
  let exercicios   = []

  try {
    const exTxt = document.getElementById('t-exercicios').value.trim()
    if (exTxt) exercicios = JSON.parse(exTxt)
  } catch { return mostrarMsg('err-treino', 'JSON dos exercícios inválido.') }

  if (!usuario_id || !nome) return mostrarMsg('err-treino', 'Selecione um aluno e informe o nome do treino.')

  const r = await fetch(`${API}/treinos`, {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ usuario_id: Number(usuario_id), nome, dia_semana, duracao_min, exercicios })
  })
  const d = await r.json()
  if (!r.ok) return mostrarMsg('err-treino', d.erro)

  mostrarMsg('ok-treino', `Treino "${d.nome}" criado para o aluno com sucesso!`)
  document.getElementById('total-treinos').textContent =
    Number(document.getElementById('total-treinos').textContent || 0) + 1
}

// ── CRIAR DIETA ───────────────────────────────────────────────
async function criarDieta() {
  const usuario_id = document.getElementById('select-aluno-dieta').value
  const nome       = document.getElementById('d-nome').value.trim()
  const horario    = document.getElementById('d-hora').value
  const calorias   = Number(document.getElementById('d-kcal').value)
  const descricao  = document.getElementById('d-desc').value

  if (!usuario_id || !nome) return mostrarMsg('err-dieta', 'Selecione um aluno e informe o nome da refeição.')

  const r = await fetch(`${API}/dietas`, {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ usuario_id: Number(usuario_id), nome, horario, calorias, descricao })
  })
  const d = await r.json()
  if (!r.ok) return mostrarMsg('err-dieta', d.erro)
  mostrarMsg('ok-dieta', `Refeição "${d.nome}" adicionada com sucesso!`)
}

// ── CRIAR AVALIAÇÃO ───────────────────────────────────────────
async function criarAvaliacao() {
  const usuario_id     = document.getElementById('select-aluno-aval').value
  const peso           = Number(document.getElementById('av-peso').value)
  const gordura_pct    = Number(document.getElementById('av-gord').value)
  const massa_muscular = Number(document.getElementById('av-massa').value)
  const observacoes    = document.getElementById('av-obs').value
  const data_avaliacao = document.getElementById('av-data').value

  if (!usuario_id) return mostrarMsg('err-aval', 'Selecione um aluno.')

  const r = await fetch(`${API}/avaliacoes`, {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ usuario_id: Number(usuario_id), peso, gordura_pct, massa_muscular, observacoes, data_avaliacao })
  })
  const d = await r.json()
  if (!r.ok) return mostrarMsg('err-aval', d.erro)
  mostrarMsg('ok-aval', 'Avaliação registrada com sucesso!')
  document.getElementById('total-avals').textContent =
    Number(document.getElementById('total-avals').textContent || 0) + 1
  carregarAvaliacoes()
}

async function carregarAvaliacoes() {
  const r = await fetch(`${API}/avaliacoes`, { headers: hdrs() })
  const lista = await r.json()
  const el = document.getElementById('lista-avals')
  if (!lista.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhuma avaliação.</p>'; return }
  el.innerHTML = lista.map(a => `
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <strong>${a.aluno_nome || 'Aluno'}</strong>
        <span style="color:var(--mut);font-size:.78rem;">${new Date(a.data_avaliacao).toLocaleDateString('pt-BR')}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:.82rem;">
        <span>⚖️ Peso: <strong>${a.peso || '-'} kg</strong></span>
        <span>🔥 Gordura: <strong>${a.gordura_pct || '-'}%</strong></span>
        <span>💪 Massa: <strong>${a.massa_muscular || '-'} kg</strong></span>
      </div>
      ${a.observacoes ? `<p style="margin-top:8px;font-size:.8rem;color:var(--mut);">${a.observacoes}</p>` : ''}
    </div>
  `).join('')
  document.getElementById('total-avals').textContent = lista.length
}

// ── CRIAR AGENDAMENTO ─────────────────────────────────────────
async function criarAgendamento() {
  const usuario_id = document.getElementById('select-aluno-agenda').value
  const titulo     = document.getElementById('ag-titulo').value.trim()
  const tipo       = document.getElementById('ag-tipo').value
  const data_hora  = document.getElementById('ag-data').value
  const descricao  = document.getElementById('ag-desc').value

  if (!usuario_id || !titulo || !data_hora)
    return mostrarMsg('err-agenda', 'Selecione aluno, informe título e data/hora.')

  const r = await fetch(`${API}/agendamentos`, {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ usuario_id: Number(usuario_id), titulo, tipo, data_hora, descricao })
  })
  const d = await r.json()
  if (!r.ok) return mostrarMsg('err-agenda', d.erro)
  mostrarMsg('ok-agenda', `Evento "${d.titulo}" agendado!`)
  carregarAgendamentos()
}

async function carregarAgendamentos() {
  const r = await fetch(`${API}/agendamentos`, { headers: hdrs() })
  const lista = await r.json()
  const el = document.getElementById('lista-agendamentos')
  if (!lista.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhum agendamento.</p>'; return }
  const badges = { pendente:'#F5E001', confirmado:'#2ecc71', cancelado:'#e74c3c' }
  el.innerHTML = lista.map(a => `
    <div class="card" style="margin-bottom:8px;display:flex;gap:14px;align-items:center;">
      <div style="background:var(--red);color:#fff;border-radius:8px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:50px;">
        <div style="font-size:1.1rem;font-weight:900;line-height:1;">${new Date(a.data_hora).getDate()}</div>
        <div style="font-size:.55rem;letter-spacing:1px;">${new Date(a.data_hora).toLocaleString('pt-BR',{month:'short'}).toUpperCase()}</div>
      </div>
      <div style="flex:1;">
        <div style="font-weight:700;">${a.aluno_nome || 'Aluno'} — ${a.titulo}</div>
        <div style="font-size:.75rem;color:var(--mut);">${new Date(a.data_hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · ${a.tipo}</div>
      </div>
      <span style="background:${badges[a.status]}22;color:${badges[a.status]};border:1px solid ${badges[a.status]};padding:3px 10px;border-radius:5px;font-size:.65rem;font-weight:700;text-transform:uppercase;">${a.status}</span>
    </div>
  `).join('')
}

// ── ENVIAR NOTIFICAÇÃO ────────────────────────────────────────
async function enviarNotificacao() {
  const usuario_id = document.getElementById('select-aluno-notif').value
  const titulo     = document.getElementById('n-titulo').value.trim()
  const mensagem   = document.getElementById('n-msg').value.trim()

  if (!usuario_id || !titulo || !mensagem)
    return mostrarMsg('err-notif', 'Preencha todos os campos.')

  const r = await fetch(`${API}/notificacoes`, {
    method: 'POST', headers: hdrs(),
    body: JSON.stringify({ usuario_id: Number(usuario_id), titulo, mensagem })
  })
  const d = await r.json()
  if (!r.ok) return mostrarMsg('err-notif', d.erro)
  mostrarMsg('ok-notif', 'Notificação enviada com sucesso!')
  document.getElementById('n-titulo').value = ''
  document.getElementById('n-msg').value = ''
}

// ── HELPERS ───────────────────────────────────────────────────
function mostrarMsg(id, txt) {
  const el = document.getElementById(id)
  el.textContent = txt
  el.style.display = 'block'
  setTimeout(() => { el.style.display = 'none' }, 4000)
}

function logout() {
  localStorage.removeItem('token')
  localStorage.removeItem('usuario')
  window.location.href = '../index.html'
}

// Inicializa
carregarAlunos()
carregarAvaliacoes()
carregarAgendamentos()
</script>
