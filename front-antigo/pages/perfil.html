<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Perfil — FreakyZone</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--brd);}
  .info-row:last-child{border-bottom:none;}
  .key{font-size:.8rem;color:var(--mut);}
  .val{font-weight:600;font-size:.95rem;}
  .aval-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:8px;}
  .notif-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;}
  .notif-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px;}
  .notif-dot.lida{background:var(--brd);}
</style>
</head>
<body>
<nav class="navbar">
  <a href="home.html" class="brand">FREAKYZONE</a>
  <div class="nav-links">
    <a href="home.html">Início</a>
    <a href="treino.html">Treino</a>
    <a href="dieta.html">Dieta</a>
    <a href="agenda.html">Agenda</a>
    <a href="perfil.html" class="active">Perfil</a>
    <a href="#" onclick="logout()" class="sair">Sair</a>
  </div>
</nav>
<div class="content">
  <div class="perfil-hero">
    <div class="perfil-av">🧑</div>
    <div class="perfil-name" id="p-nome">Carregando...</div>
    <div class="perfil-plan" id="p-obj">—</div>
  </div>
  <div class="stat-strip">
    <div class="stat-box"><div class="val" id="p-peso">-</div><div class="lbl">Peso (kg)</div></div>
    <div class="stat-box"><div class="val" id="p-altura">-</div><div class="lbl">Altura (cm)</div></div>
    <div class="stat-box"><div class="val" id="p-imc">-</div><div class="lbl">IMC</div></div>
  </div>

  <div class="sec-head" style="margin-top:20px;"><h3>Dados <span>Pessoais</span></h3></div>
  <div class="card" style="border-left:none;padding:8px 20px;">
    <div class="info-row"><span class="key">Nome</span><span class="val" id="i-nome">-</span></div>
    <div class="info-row"><span class="key">E-mail</span><span class="val" id="i-email">-</span></div>
    <div class="info-row"><span class="key">Objetivo</span><span class="val" id="i-obj">-</span></div>
    <div class="info-row"><span class="key">Membro desde</span><span class="val" id="i-data">-</span></div>
  </div>

  <div class="sec-head" style="margin-top:20px;"><h3>Histórico de <span>Avaliações</span></h3></div>
  <div id="lista-avals"><p style="color:var(--mut)">Carregando...</p></div>

  <div class="sec-head" style="margin-top:20px;"><h3>Minhas <span>Notificações</span></h3></div>
  <div id="lista-notifs"><p style="color:var(--mut)">Carregando...</p></div>

  <button class="btn-logout" onclick="logout()">SAIR DA CONTA</button>
</div>
<footer>Equipe <span>Freaky</span> · FreakyZone</footer>
<script>
const API   = 'http://localhost:3333/api'
const token = localStorage.getItem('token')
if (!token) window.location.href = '../index.html'
function hdrs() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } }

async function carregarPerfil() {
  try {
    const r = await fetch(`${API}/usuarios/perfil`, { headers: hdrs() })
    const u = await r.json()
    document.getElementById('p-nome').textContent   = u.nome
    document.getElementById('p-obj').textContent    = u.objetivo || 'Sem objetivo'
    document.getElementById('p-peso').textContent   = u.peso || '-'
    document.getElementById('p-altura').textContent = u.altura || '-'
    document.getElementById('i-nome').textContent   = u.nome
    document.getElementById('i-email').textContent  = u.email
    document.getElementById('i-obj').textContent    = u.objetivo || '-'
    if (u.criado_em) document.getElementById('i-data').textContent = new Date(u.criado_em).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })
    if (u.peso && u.altura) {
      const h = u.altura / 100
      document.getElementById('p-imc').textContent = (u.peso / (h * h)).toFixed(1)
    }
    localStorage.setItem('usuario', JSON.stringify(u))
  } catch { document.getElementById('p-nome').textContent = 'Erro ao carregar' }
}

async function carregarAvaliacoes() {
  const el = document.getElementById('lista-avals')
  try {
    const r = await fetch(`${API}/avaliacoes`, { headers: hdrs() })
    const lista = await r.json()
    if (!lista.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhuma avaliação registrada.</p>'; return }
    el.innerHTML = lista.map(a => `
      <div class="aval-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <strong>📊 Avaliação Física</strong>
          <span style="color:var(--mut);font-size:.78rem;">${new Date(a.data_avaliacao).toLocaleDateString('pt-BR')}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:.82rem;">
          <span>⚖️ <strong>${a.peso || '-'} kg</strong></span>
          <span>🔥 <strong>${a.gordura_pct || '-'}%</strong> gordura</span>
          <span>📐 IMC <strong>${a.imc || '-'}</strong></span>
        </div>
        ${a.observacoes ? `<p style="margin-top:8px;font-size:.78rem;color:var(--mut);">${a.observacoes}</p>` : ''}
      </div>`).join('')
  } catch { el.innerHTML = '<p style="color:var(--mut)">Erro ao carregar avaliações.</p>' }
}

async function carregarNotificacoes() {
  const el = document.getElementById('lista-notifs')
  try {
    const r = await fetch(`${API}/notificacoes`, { headers: hdrs() })
    const lista = await r.json()
    if (!lista.length) { el.innerHTML = '<p style="color:var(--mut)">Nenhuma notificação.</p>'; return }
    el.innerHTML = lista.map(n => `
      <div class="notif-card" onclick="marcarLida(${n.id}, this)">
        <div class="notif-dot ${n.lida ? 'lida' : ''}"></div>
        <div>
          <div style="font-weight:700;font-size:.9rem;">${n.titulo}</div>
          <div style="font-size:.8rem;color:var(--mut);margin-top:3px;">${n.mensagem}</div>
          <div style="font-size:.72rem;color:var(--mut);margin-top:4px;">${new Date(n.criado_em).toLocaleDateString('pt-BR')}</div>
        </div>
      </div>`).join('')
  } catch {}
}

async function marcarLida(id, el) {
  await fetch(`${API}/notificacoes/${id}/ler`, { method: 'PUT', headers: hdrs() })
  el.querySelector('.notif-dot').classList.add('lida')
}

function logout() { localStorage.removeItem('token'); localStorage.removeItem('usuario'); window.location.href = '../index.html' }
carregarPerfil(); carregarAvaliacoes(); carregarNotificacoes()
</script>
</body>
</html>
